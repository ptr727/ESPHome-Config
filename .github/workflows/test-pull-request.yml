name: Test pull request action

# Lint gate for an operational (live-config) repository: CI is lint/validation only, no build or unit tests.
# Operational model - develop takes direct signed commits (push runs advisory CI), main is the promoted snapshot
# (the develop -> main promotion PR runs the enforced gate). check-workflow-status is the ruleset-bound required
# check - rename it and the branch ruleset context together.

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # Source lint with the same configs the editor extensions and CLI use (linter parity): markdown, spelling, and
  # workflow YAML run as pinned action wrappers; editorconfig-checker's action is install-only, so it runs via Docker.
  lint:
    name: Lint sources job
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:

      - name: Checkout code step
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Lint Markdown step
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24.0.0
        with:
          globs: '**/*.md'

      - name: Spell check step
        uses: streetsidesoftware/cspell-action@de2a73e963e7443969755b648a1008f77033c5b2 # v8.4.0
        with:
          files: '**/*.md'
          incremental_files_only: false

      - name: Lint workflows step
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2.2.0

      - name: Check EditorConfig step
        run: docker run --rm -v "$PWD":/check --workdir /check mstruebing/editorconfig-checker:latest

  # GitHub Actions does not support required status checks on conditional jobs, so a single always-run aggregator gates
  # the merge. Its name is the ruleset-bound required status-check context - rename it and the ruleset context together.
  check-workflow-status:
    name: Check pull request workflow status job
    runs-on: ubuntu-latest
    needs: [ lint ]
    if: always()
    steps:
      - name: Check workflow results step
        run: |
          set -euo pipefail
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "Job 'lint' did not succeed (${{ needs.lint.result }}); refusing to pass."
            exit 1
          fi
