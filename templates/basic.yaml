# Required substitutions:
# device_name

# https://esphome.io/components/button/
button:

  # https://esphome.io/components/button/restart
  - platform: restart
    name: "Restart"

# https://esphome.io/components/binary_sensor
binary_sensor:

  # https://esphome.io/components/binary_sensor/status
  - platform: status
    name: "Status"

# https://esphome.io/components/text_sensor
text_sensor:

  # https://esphome.io/components/text_sensor/version
  - platform: version
    name: "Version"
    hide_timestamp: true

# https://esphome.io/components/sensor
sensor:

  # https://esphome.io/components/sensor/uptime
  - platform: uptime
    name: "Uptime"
    unit_of_measurement: min
    filters:
      - lambda: return x / 60.0;
