# Required substitutions:
# device_name
# rgb_led_pin, e.g. GPIO38

# Optional substitutions:
# system_status_led_brightness (default "50%")
# blink_on_off_time            (default "200ms")

# RGB status LED driven by Flo-R1der's prioritized status package.
# Package handles boot/wifi/API state colors automatically; consumers can also
# call `script.execute: led_working_status_<color>` / `led_feedback_blink_<color>`
# from their own configs. See package README for full color/effect catalog.
# https://github.com/Flo-R1der/ESPHome_RGB-Status-LED_Package

# https://esphome.io/guides/configuration-types.html#packages
packages:
  flo_r1der_status_led: github://Flo-R1der/ESPHome_RGB-Status-LED_Package/status_led_package.yaml@main

# https://esphome.io/components/light/
light:

  # https://esphome.io/components/light/esp32_rmt_led_strip
  - platform: esp32_rmt_led_strip
    id: system_status_led  # required name for Flo-R1der package
    name: "Status LED"
    pin: ${rgb_led_pin}
    rgb_order: GRB
    num_leds: 1
    chipset: WS2812
    disabled_by_default: true
    default_transition_length: 200ms
    restore_mode: ALWAYS_OFF
    icon: mdi:led-outline
    entity_category: diagnostic

    # https://esphome.io/components/light/#light-effects
    # Effect names match what the Flo-R1der package expects (case-sensitive).
    effects:
      - pulse:
          name: "Fast Pulse"
          update_interval: 400ms
          max_brightness: ${system_status_led_brightness}
      - pulse:
          name: "Slow Pulse"
          update_interval: 1s
          max_brightness: ${system_status_led_brightness}
      - pulse:
          name: "Breath"
          update_interval: 2.5s
          max_brightness: ${system_status_led_brightness}
