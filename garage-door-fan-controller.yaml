# https://esphome.io/guides/configuration-types.html#substitutions
substitutions:
  device_name: garage-door-fan-controller
  device_friendly_name: "Garage Door Fan Controller"
  fan_temperature_high: "28.0" # ~82F

# https://esphome.io/guides/configuration-types.html#packages
packages:
  sonoff_th10: !include templates/sonoff-th10.yaml

# https://esphome.io/components/esphome
esphome:
  on_boot:
    - priority: -100
      then:
        - climate.control:
            id: thermo
            mode: cool

# https://esphome.io/components/sensor
sensor:

  # https://esphome.io/components/sensor/dallas_temp.html
  - platform: dallas_temp
    address: 0x4E3C01D075B62428
    name: Temperature
    id: temp
    update_interval: 15s
    # https://esphome.io/components/sensor/index.html#sliding-window-moving-average
    filters:
      - filter_out: nan
      - sliding_window_moving_average:
          window_size: 3

# https://esphome.io/components/climate
climate:

  # https://esphome.io/components/climate/thermostat.html
  - platform: thermostat
    name: "Thermostat Controller"
    id: thermo
    sensor: temp
    min_cooling_off_time: 60s
    min_cooling_run_time: 60s
    min_idle_time: 60s
    cool_action:
      - logger.log: "Thermostat : Cool Action, Turning Relay On."
      - switch.turn_on: relay
    idle_action:
      - logger.log: "Thermostat : Idle Action, Turning Relay Off."
      - switch.turn_off: relay
    default_preset: Default
    preset:
      - name: Default
        default_target_temperature_high: ${fan_temperature_high}
    visual:
      min_temperature: 20.0
      max_temperature: 40.0
      temperature_step: 0.5
